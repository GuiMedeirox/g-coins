services:
  db:
    image: postgres:16-alpine
    container_name: gcoins-db
    environment:
      POSTGRES_USER: gcoins
      POSTGRES_PASSWORD: gcoins
      POSTGRES_DB: gcoins
    ports:
      - '5432:5432'
    volumes:
      - gcoins-db:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U gcoins']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  gcoins-db:
